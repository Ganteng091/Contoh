<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pro Trading Simulator</title>
  <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
  <style>
    body{margin:0;font-family:sans-serif;background:#0b1220;color:#fff}
    .wrap{max-width:520px;margin:auto;padding:10px}
    .card{background:#111827;padding:10px;border-radius:12px}
    #chart{height:50vh}
    select,button,input{padding:8px;margin:4px;border-radius:8px;border:none}
    button{color:#fff}
    .buy{background:#22c55e}
    .sell{background:#ef4444}
  </style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <h3>Trading Simulator PRO</h3>
    <select id="symbol">
      <option value="btcusdt">BTC/USDT</option>
      <option value="ethusdt">ETH/USDT</option>
      <option value="bnbusdt">BNB/USDT</option>
    </select>
    <select id="tf">
      <option value="1m">1m</option>
      <option value="5m">5m</option>
      <option value="15m">15m</option>
    </select>
    <div id="chart" style="width:100%;height:300px"></div>

    <p>Harga: <span id="price">-</span></p>
    <p>Saldo: <span id="balance">10000</span></p>
    <p>Aset: <span id="qty">0</span></p>
    <p>PnL: <span id="pnl">0</span></p>

    <input id="amount" placeholder="Qty" type="number" step="0.001">
    <button class="buy" onclick="buy()">BUY</button>
    <button class="sell" onclick="sell()">SELL</button>
  </div>
</div>

<script>
const chartContainer = document.getElementById('chart');
const chart = LightweightCharts.createChart(chartContainer, {
  width: chartContainer.clientWidth,
  height: 300,
  layout:{background:{color:'#111827'},textColor:'#fff'}
});
const candleSeries = chart.addCandlestickSeries();
const maSeries = chart.addLineSeries({color:'yellow'});

let balance=10000, qty=0, entry=0, lastPrice=0;

function updateUI(){
  document.getElementById('balance').innerText=balance.toFixed(2);
  document.getElementById('qty').innerText=qty.toFixed(4);
  document.getElementById('price').innerText=lastPrice.toFixed(2);
  let pnl = qty>0?(lastPrice-entry)*qty:0;
  document.getElementById('pnl').innerText=pnl.toFixed(2);
}

async function load(){
  let sym=document.getElementById('symbol').value;
  let tf=document.getElementById('tf').value;
  let res=await fetch(`https://api.binance.com/api/v3/klines?symbol=${sym.toUpperCase()}&interval=${tf}&limit=200`);
  let data=await res.json();

  let candles=data.map(d=>({time:d[0]/1000,open:+d[1],high:+d[2],low:+d[3],close:+d[4]}));
  candleSeries.setData(candles);

  // MA
  let ma=[];
  for(let i=10;i<candles.length;i++){
    let sum=0;
    for(let j=0;j<10;j++) sum+=candles[i-j].close;
    ma.push({time:candles[i].time,value:sum/10});
  }
  maSeries.setData(ma);

  lastPrice=candles[candles.length-1].close;
  updateUI();
}

let ws;
function live(){
  if(ws) ws.close();
  let sym=document.getElementById('symbol').value;
  let tf=document.getElementById('tf').value;
  ws=new WebSocket(`wss://stream.binance.com:9443/ws/${sym}@kline_${tf}`);

  ws.onmessage=e=>{
    let k=JSON.parse(e.data).k;
    let c={time:k.t/1000,open:+k.o,high:+k.h,low:+k.l,close:+k.c};
    candleSeries.update(c);
    lastPrice=c.close;
    updateUI();
  }
}

function buy(){
  let amt=parseFloat(amount.value);
  if(balance<amt*lastPrice) return alert('Saldo kurang');
  entry=(entry*qty + amt*lastPrice)/(qty+amt);
  qty+=amt;
  balance-=amt*lastPrice;
  updateUI();
}

function sell(){
  let amt=parseFloat(amount.value);
  if(amt>qty) return alert('Aset kurang');
  qty-=amt;
  balance+=amt*lastPrice;
  if(qty==0) entry=0;
  updateUI();
}

symbol.onchange=()=>{load();live()};
tf.onchange=()=>{load();live()};

load().then(live);
</script>
</body>
</html>

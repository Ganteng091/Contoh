<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simulasi Trading</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-chart-financial"></script>
  <style>
    body { font-family: Arial; background:#0f172a; color:#e2e8f0; text-align:center; }
    .container { width:90%; margin:auto; }
    canvas { background:#111827; border-radius:10px; }
    button, select { margin:10px; padding:10px; border-radius:8px; border:none; }
    .buy { background:#22c55e; }
    .sell { background:#ef4444; }
  </style>
</head>
<body>
  <h1>Simulasi Trading Crypto & Saham</h1>
  <div class="container">
    <select id="asset">
      <option value="BTC">BTC</option>
      <option value="ETH">ETH</option>
      <option value="BMRI">BMRI</option>
    </select>

    <p>Saldo: <span id="balance">10000</span></p>
    <p>Aset: <span id="assetQty">0</span></p>

    <button class="buy" onclick="buy()">BUY</button>
    <button class="sell" onclick="sell()">SELL</button>

    <canvas id="chart"></canvas>
  </div>

<script>
let balance = 10000;
let assetQty = 0;
let price = 100;
let data = [];

function generateCandle() {
  let open = price;
  let close = open + (Math.random() - 0.5) * 10;
  let high = Math.max(open, close) + Math.random() * 5;
  let low = Math.min(open, close) - Math.random() * 5;
  price = close;
  return {x: new Date(), o: open, h: high, l: low, c: close};
}

for(let i=0;i<30;i++) data.push(generateCandle());

const ctx = document.getElementById('chart').getContext('2d');
const chart = new Chart(ctx, {
  type: 'candlestick',
  data: {
    datasets: [{
      label: 'Harga',
      data: data
    }]
  }
});

setInterval(() => {
  data.push(generateCandle());
  data.shift();
  chart.update();
}, 2000);

function buy(){
  if(balance >= price){
    assetQty += 1;
    balance -= price;
    updateUI();
  }
}

function sell(){
  if(assetQty > 0){
    assetQty -= 1;
    balance += price;
    updateUI();
  }
}

function updateUI(){
  document.getElementById('balance').innerText = balance.toFixed(2);
  document.getElementById('assetQty').innerText = assetQty;
}
</script>
</body>
</html>
